<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Fzz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Cormorant+Garamond:wght@500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root {
            --bg: #000000;
            --panel: rgba(15, 15, 15, 0.35);
            --text: #ffffff;
            --muted: rgba(255, 255, 255, 0.65);
            --accent: rgba(83, 70, 0, 0.5);
            --accent-light: rgba(83, 70, 0, 0.3);
            --shadow: 0 25px 50px -8px rgba(0, 0, 0, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            background: var(--bg);
        }

        body {
            min-height: 100vh;
            overflow: hidden;
            font-family: "Manrope", sans-serif;
            color: var(--text);
            background: #000;
        }

        body.site-ready {
            overflow: auto;
        }

        .background-scene {
            position: fixed;
            inset: 0;
            background:
                linear-gradient(180deg,
                    rgba(0, 0, 0, 0.3),
                    rgba(0, 0, 0, 0.5)),
                url('./img/yangi.jpg') center no-repeat;
        }

        /* Yengil blur va qoraytirish */
        .background-scene::after {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.25);
            z-index: -2;
        }

        /* LOADING SCREEN */
        .loading-screen {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000000;
            cursor: pointer;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .loading-card {
            text-align: center;
            padding: 20px;
        }

        .avatar-ring {
            width: 170px;
            height: 170px;
            margin: 0 auto 24px;
            border-radius: 50%;
            padding: 3px;
            background: linear-gradient(135deg, rgba(83, 70, 0, 0.5), rgba(255, 255, 255, 0.1));
        }

        .avatar-ring img {
            width: 100%;
            height: 100%;
            display: block;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(20, 20, 20, 0.8);
            background: #1a1a1a;
        }

        .loading-title {
            font-family: sans-serif;
            font-size: 3.8rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            line-height: 1;
            /* text-transform: uppercase; */
            color: #fff;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            margin-bottom: 12px;
        }

        .loading-note {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.1rem;
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 16px;
            padding: 10px 24px;
            border: 1px solid rgba(83, 70, 0, 0.4);
            border-radius: 50px;
            display: inline-block;
            /* backdrop-filter: blur(10px); */
            background: rgba(0, 0, 0, 0.2);
        }

        /* APP SHELL */
        .app-shell {
            min-height: 100vh;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.6s ease, visibility 0.6s ease;
            padding: 22px 16px 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 10;
        }

        .app-shell.visible {
            opacity: 1;
            visibility: visible;
        }

        /* Musiqa tugmasi */
        .music-toggle {
            position: fixed;
            top: max(18px, env(safe-area-inset-top));
            right: 16px;
            width: 52px;
            height: 52px;
            border-radius: 18px;
            background: rgba(10, 10, 10, 0.5);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid rgba(83, 70, 0, 0.5);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            z-index: 20;
            transition: all 0.3s ease;
        }

        .music-toggle:hover {
            background: rgba(20, 20, 20, 0.6);
            border-color: rgba(83, 70, 0, 0.8);
        }

        .music-toggle i {
            font-size: 1.3rem;
            position: relative;
        }

        .music-toggle.muted i::after {
            content: "";
            position: absolute;
            top: 48%;
            left: -15%;
            width: 130%;
            height: 2px;
            background: #fff;
            border-radius: 999px;
            transform: rotate(-42deg);
        }

        /* PROFIL KARTASI */
        .profile-card {
            width: min(100%, 460px);
            padding: 32px 24px 26px;
            border-radius: 40px;
            background: rgba(15, 15, 15, 0.226);
            box-shadow: var(--shadow);
        }

        .profile-top {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin-bottom: 30px;
        }

        .profile-avatar {
            width: 115px;
            height: 115px;
            border-radius: 50%;
            margin-bottom: 20px;
            padding: 3px;
            background: linear-gradient(135deg, rgba(83, 70, 0, 0.6), rgba(255, 255, 255, 0.1));
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            display: block;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(20, 20, 20, 0.8);
            background: #1e1e1e;
        }

        .profile-name {
            font-family:sans-serif;
            font-size: 2.5rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            color: #fff;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .profile-domain {
            margin-top: 8px;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 0.25em;
            text-transform: uppercase;
            font-size: 0.75rem;
            padding: 4px 12px;
            border: 1px solid rgba(83, 70, 0, 0.2);
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(5px);
        }

        /* Ijtimoiy tarmoqlar */
        .social-list {
            display: grid;
            gap: 14px;
        }

        .social-link {
            width: 100%;
            display: grid;
            grid-template-columns: 56px 1fr;
            gap: 16px;
            align-items: center;
            padding: 14px 18px;
            border-radius: 24px;
            border: 1px solid rgba(83, 70, 0, 0.3);
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: inherit;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .social-link:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(83, 70, 0, 0.6);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .social-icon {
            width: 56px;
            height: 56px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 1.8rem;
        }
        .social-link .fa-telegram {
            color: #26A5E4;
        }

        .social-link .fa-instagram {
            background: linear-gradient(45deg, #F58529, #DD2A7B, #8134AF, #515BD4);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .social-link .fa-tiktok {
            position: relative;
            color: #ffffff;
            font-size: 1.8rem;
            text-shadow:
                2px 2px 0 #ff0050,
                -2px -2px 0 #00f2ea,
                0 0 8px rgba(255, 0, 80, 0.6),
                0 0 8px rgba(0, 242, 234, 0.6);
            transition: 0.3s;
        }

        .social-text strong {
            display: block;
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
        }

        .social-text span {
            display: block;
            margin-top: 4px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.55);
        }

        .profile-footer {
            margin-top: 24px;
            padding-top: 18px;
            border-top: 1px solid rgba(83, 70, 0, 0.25);
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            letter-spacing: 0.5px;
        }

        .profile-footer .dot {
            padding: 0 8px;
            color: rgba(83, 70, 0, 0.5);
        }

        .audio-player {
            display: none;
        }

        /* Mobil moslashuv */
        @media (max-width: 420px) {
            .loading-title {
                font-size: 3.2rem;
            }

            .avatar-ring {
                width: 140px;
                height: 140px;
            }

            .loading-note {
                font-size: 1rem;
                padding: 8px 18px;
            }

            .profile-card {
                padding: 26px 18px 22px;
                border-radius: 34px;
            }

            .profile-avatar {
                width: 100px;
                height: 100px;
            }

            .profile-name {
                font-size: 2.2rem;
            }

            .social-link {
                grid-template-columns: 50px 1fr;
                gap: 12px;
                padding: 12px 14px;
            }

            .social-icon {
                width: 50px;
                height: 50px;
                border-radius: 18px;
                font-size: 1.5rem;
            }

            .music-toggle {
                width: 48px;
                height: 48px;
                margin-top: 18px;
                margin-right: 16px;
                border-radius: 50%;
            }
        }

    </style>
</head>

<body>
    <div class="background-scene" aria-hidden="true"></div>

    <!-- LOADING SCREEN -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-card">
            <div class="avatar-ring">
                <img src="./img/manzara.jpg" alt="Fazliddin rasmi">
            </div>
            <div class="loading-title">Fzz</div>
            <div class="loading-note">Welcome ...</div>
        </div>
    </div>

    <!-- ASOSIY CONTENT -->
    <main class="app-shell" id="appShell">
        <button class="music-toggle" id="musicToggle" type="button" aria-label="Musiqani yoqish yoki o'chirish">
            <i class="fa-solid fa-music"></i>
        </button>

        <section class="profile-card">
            <div class="profile-top">
                <div class="profile-avatar">
                    <img src="./img/manzara.jpg" alt="Fazliddin rasmi"
                        onerror="this.onerror=null;this.src='https://ui-avatars.com/api/?name=Fazliddin&size=320&background=1a1a1a&color=fff&bold=true';">
                </div>
                <h1 class="profile-name">Fzz</h1>
                <div class="profile-domain">www.fazliddin.uz</div>
            </div>

            <div class="social-list">
                <a class="social-link" href="https://t.me/fazliddinppp" target="_blank" rel="noreferrer">

                    <div class="social-icon">
                        <i class="fa-brands fa-telegram"></i>
                    </div>

                    <div class="social-text">
                        <strong>Telegram</strong>
                        <span>Oddiy Fazliddin</span>
                    </div>

                </a>

                <a class="social-link" href="https://www.instagram.com/fazliddiinnn_?igsh=N3hnbGtqd3YxYWwx"
                    target="_blank" rel="noreferrer">
                    <div class="social-icon"><i class="fa-brands fa-instagram"></i></div>
                    <div class="social-text">
                        <strong>Instagram</strong>
                        <span>Oddiy Fazliddin</span>
                    </div>
                </a>

                <a class="social-link" href="https://tiktok.com/@fzz.2" target="_blank" rel="noreferrer">
                    <div class="social-icon"><i class="fa-brands fa-tiktok"></i></div>
                    <div class="social-text">
                        <strong>TikTok</strong>
                        <span>Oddiy Fazliddin</span>
                    </div>
                </a>
            </div>

            <div class="profile-footer">
                Qashqadaryo, Uzbekistan 🇺🇿 <span class="dot">&bull;</span> Fazliddin.uz
            </div>
        </section>
    </main>

    <audio id="bgAudio" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>
    <script>
        (() => {
            const body = document.body;
            const loadingScreen = document.getElementById("loadingScreen");
            const appShell = document.getElementById("appShell");
            const musicToggle = document.getElementById("musicToggle");
            const bgAudio = document.getElementById("bgAudio");

            if (bgAudio) {
                bgAudio.volume = 0.25;
            }

            let entered = false;
            let muted = false;

            bgAudio.volume = 0.25;

            function startAudio() {
                if (muted) {
                    bgAudio.muted = true;
                    return;
                }
                bgAudio.muted = false;
                bgAudio.play().catch(() => {
                    musicToggle.classList.add("muted");
                    muted = true;
                });
            }

            function enterSite() {
                if (entered) return;
                entered = true;
                loadingScreen.classList.add("hidden");
                appShell.classList.add("visible");
                body.classList.add("site-ready");
                startAudio();
            }

            function toggleAudio() {
                muted = !muted;
                bgAudio.muted = muted;
                musicToggle.classList.toggle("muted", muted);

                if (!muted && bgAudio.paused) {
                    bgAudio.play().catch(() => {
                        muted = true;
                        bgAudio.muted = true;
                        musicToggle.classList.add("muted");
                    });
                }
            }

            // Asosiy o'zgarish: loadingScreen ga oddiy click event qo'shildi
            loadingScreen.addEventListener("click", enterSite);

            // Klaviatura uchun alohida event
            loadingScreen.addEventListener("keydown", (event) => {
                if (event.key === "Enter" || event.key === " ") {
                    event.preventDefault();
                    enterSite();
                }
            });

            // loadingScreen ni klaviatura orqali focus qilish mumkin bo'lishi uchun
            loadingScreen.setAttribute("tabindex", "0");
            loadingScreen.setAttribute("role", "button");
            loadingScreen.setAttribute("aria-label", "Saytga kirish");

            musicToggle.addEventListener("click", toggleAudio);
        })();
    </script>
</body>

</html>
